<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bol Processor 3 — Web</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Helvetica Neue', Arial, sans-serif; background: #2c3e50; color: #e8e4dc; }

  /* Layout */
  .app { display: flex; height: 100vh; }

  /* Sidebar - Library */
  .sidebar {
    width: 280px; min-width: 280px; background: #1e2d3d;
    border-right: 1px solid #3d5a6e; display: flex; flex-direction: column;
    overflow: hidden;
  }
  .sidebar-header {
    padding: 16px; border-bottom: 1px solid #3d5a6e;
    background: #263849;
  }
  .sidebar-header h2 { color: #90a4ae; font-size: 1em; margin-bottom: 8px; }
  .sidebar-header input {
    width: 100%; padding: 6px 10px; background: #1e2d3d; color: #e8e4dc;
    border: 1px solid #3d5a6e; border-radius: 4px; font-size: 0.85em;
  }
  .sidebar-header input::placeholder { color: #546e7a; }

  .library-list { flex: 1; overflow-y: auto; padding: 8px 0; }

  .category-header {
    padding: 6px 16px; font-size: 0.75em; text-transform: uppercase;
    color: #90a4ae; font-weight: 600; letter-spacing: 0.5px;
    position: sticky; top: 0; background: #1e2d3d; z-index: 1;
  }
  .grammar-item {
    padding: 8px 16px; cursor: pointer; font-size: 0.85em;
    border-left: 3px solid transparent; transition: all 0.15s;
  }
  .grammar-item:hover { background: #263849; border-left-color: #3d5a6e; }
  .grammar-item.active { background: #263849; border-left-color: #90a4ae; }
  .grammar-item .title { color: #e8e4dc; }
  .grammar-item .meta { color: #78909c; font-size: 0.8em; margin-top: 2px; }
  .grammar-item .mode-badge {
    display: inline-block; font-size: 0.7em; padding: 1px 5px;
    border-radius: 3px; background: #3d5a6e; color: #b0bec5;
    font-weight: 600; margin-left: 6px; vertical-align: middle;
  }

  /* Main content */
  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

  .top-bar {
    padding: 12px 20px; background: #263849; border-bottom: 1px solid #3d5a6e;
    display: flex; align-items: center; gap: 12px;
  }
  .top-bar h1 { color: #F0ECE3; font-size: 1.3em; white-space: nowrap; }
  .top-bar .spacer { flex: 1; }
  .top-bar #status { font-size: 0.85em; color: #78909c; }

  /* Toolbar */
  .toolbar {
    padding: 8px 20px; background: #233444; border-bottom: 1px solid #3d5a6e;
    display: flex; align-items: center; gap: 8px;
  }
  button {
    background: #546e7a; color: #F0ECE3; border: none; border-radius: 4px;
    padding: 8px 18px; font-size: 0.9em; cursor: pointer;
  }
  button:hover { background: #607d8b; }
  button:disabled { background: #37474f; cursor: not-allowed; color: #546e7a; }
  button.secondary { background: #3d5a6e; }
  button.secondary:hover { background: #4a6d82; }

  /* Editor area */
  .editor-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

  .editor-tabs {
    display: flex; background: #1e2d3d; border-bottom: 1px solid #3d5a6e;
  }
  .editor-tab {
    padding: 8px 16px; font-size: 0.85em; cursor: pointer;
    color: #78909c; border-bottom: 2px solid transparent;
  }
  .editor-tab:hover { color: #b0bec5; }
  .editor-tab.active { color: #F0ECE3; border-bottom-color: #90a4ae; }

  .editor-panels { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .editor-panel { display: none; flex: 1; overflow: hidden; }
  .editor-panel.active { display: flex; flex-direction: column; }

  textarea {
    flex: 1; width: 100%; font-family: 'Consolas', 'Courier New', monospace;
    font-size: 13px; background: #1e2d3d; color: #e8e4dc;
    border: none; padding: 12px 20px; resize: none; outline: none;
    line-height: 1.5;
  }

  /* Output area */
  .output-area {
    height: 40%; min-height: 120px; border-top: 2px solid #3d5a6e;
    display: flex; flex-direction: column; overflow: hidden;
  }
  .output-tabs {
    display: flex; background: #1e2d3d; border-bottom: 1px solid #3d5a6e;
  }
  .output-tab {
    padding: 6px 14px; font-size: 0.8em; cursor: pointer;
    color: #78909c; border-bottom: 2px solid transparent;
  }
  .output-tab:hover { color: #b0bec5; }
  .output-tab.active { color: #a5d6a7; border-bottom-color: #a5d6a7; }
  .output-tab.has-errors { color: #ef9a9a; }

  .output-panels { flex: 1; overflow: hidden; }
  .output-panel {
    display: none; height: 100%; overflow: auto; padding: 12px 20px;
    font-family: 'Consolas', 'Courier New', monospace; font-size: 13px;
    white-space: pre-wrap;
  }
  .output-panel.active { display: block; }
  #outputContent { color: #a5d6a7; }
  #messagesContent { color: #ffe082; }

  /* Description bar */
  .desc-bar {
    padding: 8px 20px; background: #233444; border-bottom: 1px solid #3d5a6e;
    font-size: 0.82em; color: #78909c; overflow: hidden; text-overflow: ellipsis;
    white-space: nowrap;
  }
  .desc-bar strong { color: #b0bec5; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-track { background: #1e2d3d; }
  ::-webkit-scrollbar-thumb { background: #3d5a6e; border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: #4a6d82; }

  /* Resize handle */
  .resize-handle {
    height: 4px; background: #3d5a6e; cursor: ns-resize;
  }
  .resize-handle:hover { background: #90a4ae; }
</style>
</head>
<body>
<div class="app">
  <!-- Sidebar: Grammar Library -->
  <div class="sidebar">
    <div class="sidebar-header">
      <h2>Grammar Library</h2>
      <input type="text" id="searchInput" placeholder="Search grammars..." oninput="filterLibrary()">
    </div>
    <div class="library-list" id="libraryList">
      <div style="padding: 16px; color: #666; font-size: 0.85em;">Loading library...</div>
    </div>
  </div>

  <!-- Main Content -->
  <div class="main">
    <div class="top-bar">
      <h1>Bol Processor 3</h1>
      <div class="spacer"></div>
      <span id="status">Loading WASM module...</span>
    </div>

    <div class="toolbar">
      <button id="produceBtn" onclick="produce()" disabled>Produce</button>
      <button id="playBtn" class="secondary" onclick="playMidi()" disabled>Play</button>
      <button id="stopBtn" class="secondary" onclick="stopPlayback()" style="display:none;">Stop</button>
      <button id="initBtn" class="secondary" onclick="reinit()" disabled>Re-init</button>
      <button class="secondary" onclick="clearEditor()">Clear</button>
    </div>

    <div id="descBar" class="desc-bar" style="display:none;"></div>

    <div class="editor-area">
      <!-- Editor tabs -->
      <div class="editor-tabs">
        <div class="editor-tab active" onclick="switchEditorTab('grammar')">Grammar</div>
        <div class="editor-tab" onclick="switchEditorTab('alphabet')">Alphabet</div>
        <div class="editor-tab" onclick="switchEditorTab('settings')">Settings</div>
      </div>
      <div class="editor-panels">
        <div class="editor-panel active" id="panel-grammar">
          <textarea id="grammar" spellcheck="false" placeholder="Enter grammar or select from library...">gram#1[1] S --> A B C / D E F
gram#1[2] S --> X Y Z</textarea>
        </div>
        <div class="editor-panel" id="panel-alphabet">
          <textarea id="alphabet" spellcheck="false" placeholder="Alphabet definitions (optional)"></textarea>
        </div>
        <div class="editor-panel" id="panel-settings">
          <textarea id="settings" spellcheck="false" placeholder="Settings JSON (optional)"></textarea>
        </div>
      </div>
    </div>

    <!-- Output area -->
    <div class="resize-handle" id="resizeHandle"></div>
    <div class="output-area" id="outputArea">
      <div class="output-tabs">
        <div class="output-tab active" onclick="switchOutputTab('output')">Output</div>
        <div class="output-tab" id="messagesTab" onclick="switchOutputTab('messages')">Messages</div>
      </div>
      <div class="output-panels">
        <div class="output-panel active" id="outputContent">(not yet produced)</div>
        <div class="output-panel" id="messagesContent">(no messages)</div>
      </div>
    </div>
  </div>
</div>

<script>
/* ---- State ---- */
let bp3 = null;
let bp3_init, bp3_load_grammar, bp3_load_alphabet, bp3_load_settings, bp3_produce, bp3_get_result, bp3_get_messages;
let bp3_get_midi_events, bp3_get_midi_event_count;
let libraryData = [];
let activeGrammar = null;
let engineReady = false;
let lastMidiEvents = null;
let audioCtx = null;
let isPlaying = false;
let scheduledNodes = [];

/* ---- Library ---- */
async function loadLibrary() {
  try {
    const resp = await fetch('./library/index.json');
    libraryData = await resp.json();
    renderLibrary(libraryData);
  } catch(e) {
    document.getElementById('libraryList').innerHTML =
      '<div style="padding:16px;color:#ff6b6b;font-size:0.85em;">Failed to load library: ' + e.message + '</div>';
  }
}

function renderLibrary(items) {
  const list = document.getElementById('libraryList');
  if (items.length === 0) {
    list.innerHTML = '<div style="padding:16px;color:#666;font-size:0.85em;">No grammars found.</div>';
    return;
  }

  // Group by category
  const groups = {};
  const categoryOrder = ['tabla', 'western', 'experimental', 'examples'];
  const categoryLabels = {
    tabla: 'Tabla / Indian',
    western: 'Western / Classical',
    experimental: 'Experimental',
    examples: 'Examples / Tutorial'
  };

  items.forEach(item => {
    if (!groups[item.category]) groups[item.category] = [];
    groups[item.category].push(item);
  });

  let html = '';
  categoryOrder.forEach(cat => {
    if (!groups[cat]) return;
    html += `<div class="category-header">${categoryLabels[cat] || cat} (${groups[cat].length})</div>`;
    groups[cat].forEach(item => {
      const activeClass = activeGrammar && activeGrammar.id === item.id ? ' active' : '';
      html += `<div class="grammar-item${activeClass}" onclick="loadFromLibrary('${item.id}')" data-id="${item.id}">
        <div class="title">${escHtml(item.title)} <span class="mode-badge">${item.mode}</span></div>
        ${item.description ? `<div class="meta">${escHtml(item.description.substring(0, 60))}${item.description.length > 60 ? '...' : ''}</div>` : ''}
      </div>`;
    });
  });

  list.innerHTML = html;
}

function filterLibrary() {
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  if (!q) {
    renderLibrary(libraryData);
    return;
  }
  const filtered = libraryData.filter(item =>
    item.title.toLowerCase().includes(q) ||
    item.category.toLowerCase().includes(q) ||
    item.mode.toLowerCase().includes(q) ||
    (item.description && item.description.toLowerCase().includes(q))
  );
  renderLibrary(filtered);
}

async function loadFromLibrary(id) {
  const item = libraryData.find(g => g.id === id);
  if (!item) return;

  activeGrammar = item;

  // Update sidebar active state
  document.querySelectorAll('.grammar-item').forEach(el => el.classList.remove('active'));
  const activeEl = document.querySelector(`.grammar-item[data-id="${id}"]`);
  if (activeEl) activeEl.classList.add('active');

  // Show description bar
  const descBar = document.getElementById('descBar');
  descBar.style.display = 'block';
  descBar.innerHTML = `<strong>${escHtml(item.title)}</strong> — ${item.mode} — ${item.category}${item.description ? ' — ' + escHtml(item.description) : ''}`;

  // Load files
  try {
    // Grammar (always present)
    const grResp = await fetch('./library/' + item.files.grammar);
    document.getElementById('grammar').value = await grResp.text();

    // Alphabet (optional)
    if (item.files.alphabet) {
      const alResp = await fetch('./library/' + item.files.alphabet);
      document.getElementById('alphabet').value = await alResp.text();
    } else {
      document.getElementById('alphabet').value = '';
    }

    // Settings (optional)
    if (item.files.settings) {
      const seResp = await fetch('./library/' + item.files.settings);
      document.getElementById('settings').value = await seResp.text();
    } else {
      document.getElementById('settings').value = '';
    }

    // Switch to grammar tab
    switchEditorTab('grammar');

    setStatus(`Loaded: ${item.title}`);
  } catch(e) {
    setStatus('Error loading: ' + e.message);
  }
}

/* ---- Editor Tabs ---- */
function switchEditorTab(tab) {
  document.querySelectorAll('.editor-tab').forEach((el, i) => {
    const tabs = ['grammar', 'alphabet', 'settings'];
    el.classList.toggle('active', tabs[i] === tab);
  });
  document.querySelectorAll('.editor-panel').forEach(el => {
    el.classList.toggle('active', el.id === 'panel-' + tab);
  });
}

function switchOutputTab(tab) {
  document.querySelectorAll('.output-tab').forEach((el, i) => {
    const tabs = ['output', 'messages'];
    el.classList.toggle('active', tabs[i] === tab);
  });
  document.querySelectorAll('.output-panel').forEach(el => {
    el.classList.toggle('active', el.id === tab + 'Content');
  });
}

/* ---- Engine ---- */
async function loadModule() {
  try {
    const Module = await BP3Module({
      locateFile: (path) => './' + path
    });
    bp3 = Module;
    bp3_init = Module.cwrap('bp3_init', 'number', []);
    bp3_load_grammar = Module.cwrap('bp3_load_grammar', 'number', ['string']);
    bp3_load_alphabet = Module.cwrap('bp3_load_alphabet', 'number', ['string']);
    bp3_load_settings = Module.cwrap('bp3_load_settings', 'number', ['string']);
    bp3_produce = Module.cwrap('bp3_produce', 'number', []);
    bp3_get_result = Module.cwrap('bp3_get_result', 'string', []);
    bp3_get_messages = Module.cwrap('bp3_get_messages', 'string', []);
    bp3_get_midi_events = Module.cwrap('bp3_get_midi_events', 'string', []);
    bp3_get_midi_event_count = Module.cwrap('bp3_get_midi_event_count', 'number', []);

    setStatus('Module loaded. Initializing...');
    initEngine();
  } catch(e) {
    setStatus('WASM load error: ' + e.message);
    console.error(e);
  }
}

function initEngine() {
  const r = bp3_init();
  if (r === 0) {
    engineReady = true;
    setStatus('Ready.');
    document.getElementById('produceBtn').disabled = false;
    document.getElementById('initBtn').disabled = false;
  } else {
    setStatus('Init failed (code ' + r + ')');
  }
}

function reinit() {
  setStatus('Re-initializing...');
  setTimeout(() => initEngine(), 10);
}

function produce() {
  if (!engineReady) return;

  const grammar = document.getElementById('grammar').value;
  const alphabet = document.getElementById('alphabet').value;
  const settings = document.getElementById('settings').value;

  if (!grammar.trim()) {
    setStatus('No grammar to produce.');
    return;
  }

  document.getElementById('produceBtn').disabled = true;
  setStatus('Producing...');
  document.getElementById('outputContent').textContent = '';
  document.getElementById('messagesContent').textContent = '';

  setTimeout(() => {
    try {
      // Load settings FIRST (for NoteConvention etc.)
      if (settings.trim()) {
        const seResult = bp3_load_settings(settings.trim());
        if (seResult !== 0) {
          console.warn('Settings load returned:', seResult);
        }
      }

      // Load alphabet if present
      if (alphabet.trim()) {
        bp3_load_alphabet(alphabet.trim());
      }

      // Load grammar (resets CompiledGr)
      bp3_load_grammar(grammar);

      // Produce
      const result = bp3_produce();

      const output = bp3_get_result();
      const messages = bp3_get_messages();

      document.getElementById('outputContent').textContent = output || '(empty output)';
      document.getElementById('messagesContent').textContent = messages || '(no messages)';

      // Highlight messages tab if there are errors
      const msgTab = document.getElementById('messagesTab');
      if (messages && (messages.includes('Err.') || messages.includes('ABORT'))) {
        msgTab.classList.add('has-errors');
      } else {
        msgTab.classList.remove('has-errors');
      }

      // Capture MIDI events
      const midiCount = bp3_get_midi_event_count();
      lastMidiEvents = null;
      if (midiCount > 0) {
        try {
          lastMidiEvents = JSON.parse(bp3_get_midi_events());
        } catch(e2) { console.warn('MIDI parse error:', e2); }
      }

      const playBtn = document.getElementById('playBtn');
      if (lastMidiEvents && lastMidiEvents.length > 0) {
        playBtn.disabled = false;
        playBtn.title = `${lastMidiEvents.length} MIDI events`;
      } else {
        playBtn.disabled = true;
        playBtn.title = '';
      }

      const midiInfo = midiCount > 0 ? ` | ${midiCount} MIDI events` : '';
      const statusText = result === 1 ? 'Done (OK)' + midiInfo
                       : result === 0 ? 'Done (MISSED — no output)'
                       : `Done (code ${result})`;
      setStatus(statusText);

    } catch(e) {
      setStatus('Error: ' + e.message);
      document.getElementById('messagesContent').textContent = e.stack || e.message;
      // Try to reinit after crash
      try { initEngine(); } catch(e2) {}
    }
    document.getElementById('produceBtn').disabled = false;
  }, 50);
}

function clearEditor() {
  activeGrammar = null;
  document.getElementById('grammar').value = '';
  document.getElementById('alphabet').value = '';
  document.getElementById('settings').value = '';
  document.getElementById('descBar').style.display = 'none';
  document.querySelectorAll('.grammar-item').forEach(el => el.classList.remove('active'));
  switchEditorTab('grammar');
}

/* ---- Helpers ---- */
function setStatus(text) {
  document.getElementById('status').textContent = text;
}

function escHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

/* ---- Csound / Web Audio Synth ---- */
let csoundInstance = null;
let csoundReady = false;
let useCsound = true; // true = Csound, false = Web Audio fallback

// Default Csound orchestra — clean subtractive synth
const DEFAULT_ORC = `
sr = 44100
ksmps = 32
nchnls = 2
0dbfs = 1

; Instrument 1: Subtractive synth with filter envelope
instr 1
  ifreq = p4
  iamp = p5
  idur = p3

  ; Amplitude envelope (ADSR)
  iatt = 0.02
  idec = 0.1
  isus = 0.7
  irel = min(0.15, idur * 0.3)
  aenv madsr iatt, idec, isus, irel

  ; Two detuned sawtooth oscillators
  a1 vco2 iamp, ifreq
  a2 vco2 iamp * 0.7, ifreq * 1.003

  ; Low-pass filter with envelope
  kfilt expseg 4000, idur * 0.3, 1500, idur * 0.7, 800
  afilt moogladder a1 + a2, kfilt, 0.3

  ; Slight reverb send
  aout = afilt * aenv * 0.5
  outs aout, aout
endin

; Instrument 2: Soft pad (sine + triangle)
instr 2
  ifreq = p4
  iamp = p5
  idur = p3

  iatt = 0.08
  irel = min(0.3, idur * 0.4)
  aenv madsr iatt, 0.2, 0.8, irel

  a1 oscili iamp, ifreq
  a2 vco2 iamp * 0.4, ifreq, 12 ; triangle

  aout = (a1 + a2) * aenv * 0.4
  outs aout, aout
endin
`;

function midiToFreq(note) {
  return 440 * Math.pow(2, (note - 69) / 12);
}

async function initCsound() {
  if (csoundInstance) return true;
  if (!window.CsoundFactory) {
    console.warn('CsoundFactory not loaded, falling back to Web Audio');
    useCsound = false;
    return false;
  }
  try {
    setStatus('Initializing Csound...');
    csoundInstance = await window.CsoundFactory();
    if (!csoundInstance) {
      useCsound = false;
      return false;
    }
    await csoundInstance.setOption('-m0'); // suppress messages
    await csoundInstance.setOption('-d');  // no displays
    csoundReady = true;
    return true;
  } catch(e) {
    console.error('Csound init failed:', e);
    useCsound = false;
    return false;
  }
}

async function playMidi() {
  if (!lastMidiEvents || lastMidiEvents.length === 0) return;
  await stopPlayback();

  isPlaying = true;
  document.getElementById('playBtn').style.display = 'none';
  document.getElementById('stopBtn').style.display = '';

  // Group NoteOn/NoteOff
  const noteOns = lastMidiEvents.filter(e => e.type === 144 && e.velocity > 0);
  const noteOffs = lastMidiEvents.filter(e => e.type === 128 || (e.type === 144 && e.velocity === 0));
  const minTime = Math.min(...lastMidiEvents.map(e => e.time));
  const maxTime = Math.max(...lastMidiEvents.map(e => e.time));
  const totalDurSec = (maxTime - minTime) / 1000 + 1.5;

  // Build note list with durations
  const notes = noteOns.map(on => {
    const off = noteOffs.find(o => o.note === on.note && o.time > on.time);
    return {
      startSec: (on.time - minTime) / 1000,
      durSec: off ? (off.time - on.time) / 1000 : 1.0,
      note: on.note,
      velocity: on.velocity / 127,
      channel: on.channel
    };
  });

  // Try Csound first
  if (useCsound && await initCsound()) {
    await playCsound(notes, totalDurSec);
  } else {
    playWebAudio(notes, totalDurSec);
  }

  setStatus(`Playing ${notes.length} notes (${totalDurSec.toFixed(1)}s) via ${useCsound && csoundReady ? 'Csound' : 'Web Audio'}...`);
}

async function playCsound(notes, totalDurSec) {
  try {
    // Build a complete CSD with the score embedded
    let score = '';
    notes.forEach(n => {
      const freq = midiToFreq(n.note);
      const amp = n.velocity * 0.8;
      const instr = n.channel <= 1 ? 1 : 2; // channel 1 = synth, others = pad
      score += `i ${instr} ${n.startSec.toFixed(4)} ${n.durSec.toFixed(4)} ${freq.toFixed(4)} ${amp.toFixed(4)}\n`;
    });
    score += `e ${totalDurSec.toFixed(2)}\n`;

    const csd = `<CsoundSynthesizer>
<CsOptions>
-odac -m0 -d
</CsOptions>
<CsInstruments>
${DEFAULT_ORC}
</CsInstruments>
<CsScore>
${score}
</CsScore>
</CsoundSynthesizer>`;

    await csoundInstance.stop();
    await csoundInstance.compileCsdText(csd);
    await csoundInstance.start();

    // Auto-stop
    setTimeout(async () => {
      if (isPlaying) await stopPlayback();
    }, totalDurSec * 1000 + 500);

  } catch(e) {
    console.error('Csound playback error:', e);
    // Fallback to Web Audio
    useCsound = false;
    playWebAudio(notes, totalDurSec);
  }
}

function playWebAudio(notes, totalDurSec) {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if (audioCtx.state === 'suspended') audioCtx.resume();

  const now = audioCtx.currentTime + 0.1;
  notes.forEach(n => {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'triangle';
    osc.frequency.value = midiToFreq(n.note);

    const attackTime = 0.02;
    const releaseTime = Math.min(0.1, n.durSec * 0.2);
    const sustainLevel = n.velocity * 0.3;

    gain.gain.setValueAtTime(0, now + n.startSec);
    gain.gain.linearRampToValueAtTime(sustainLevel, now + n.startSec + attackTime);
    gain.gain.setValueAtTime(sustainLevel, now + n.startSec + n.durSec - releaseTime);
    gain.gain.linearRampToValueAtTime(0, now + n.startSec + n.durSec);

    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start(now + n.startSec);
    osc.stop(now + n.startSec + n.durSec + 0.01);
    scheduledNodes.push({ osc, gain });
  });

  setTimeout(() => {
    if (isPlaying) stopPlayback();
  }, totalDurSec * 1000 + 200);
}

async function stopPlayback() {
  isPlaying = false;
  document.getElementById('playBtn').style.display = '';
  document.getElementById('stopBtn').style.display = 'none';

  // Stop Csound
  if (csoundInstance) {
    try { await csoundInstance.stop(); } catch(e) {}
  }

  // Stop Web Audio nodes
  if (audioCtx) {
    scheduledNodes.forEach(({ osc, gain }) => {
      try {
        gain.gain.cancelScheduledValues(audioCtx.currentTime);
        gain.gain.setValueAtTime(0, audioCtx.currentTime);
        osc.stop(audioCtx.currentTime + 0.01);
      } catch(e) {}
    });
  }
  scheduledNodes = [];
  setStatus('Ready.');
}

/* ---- Resize handle ---- */
(function() {
  const handle = document.getElementById('resizeHandle');
  const outputArea = document.getElementById('outputArea');
  let startY, startH;

  handle.addEventListener('mousedown', (e) => {
    startY = e.clientY;
    startH = outputArea.offsetHeight;
    document.addEventListener('mousemove', onDrag);
    document.addEventListener('mouseup', onRelease);
    e.preventDefault();
  });

  function onDrag(e) {
    const delta = startY - e.clientY;
    outputArea.style.height = Math.max(80, startH + delta) + 'px';
  }

  function onRelease() {
    document.removeEventListener('mousemove', onDrag);
    document.removeEventListener('mouseup', onRelease);
  }
})();

/* ---- Init ---- */
loadLibrary();
</script>

<script>
  // Load Csound asynchronously — non-blocking, with fallback to Web Audio
  (async function() {
    try {
      const mod = await import("https://cdn.jsdelivr.net/npm/@csound/browser@6.18.7/dist/csound.esm.js");
      window.CsoundFactory = mod.Csound || mod.default;
      console.log('Csound loaded successfully');
    } catch(e) {
      console.warn('Csound failed to load, using Web Audio fallback:', e.message);
      window.CsoundFactory = null;
    }
  })();
  loadModule();
</script>
